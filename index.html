<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roadtrip Chicago → NYC</title>
<meta name="theme-color" content="#C8321A">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Manrope:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --paper:#F4EFE6; --card:#FDFBF6; --ink:#22262E; --dim:#7A7466;
  --road:#C8321A; --night:#1D4ED8; --gem:#15803D; --line:#DCD3C2;
  --display:'Bricolage Grotesque',sans-serif; --sans:'Manrope',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
header{padding:16px 16px 10px;border-bottom:3px solid var(--road)}
h1{font-family:var(--display);font-weight:800;font-size:1.5rem;line-height:1.1}
h1 span{color:var(--road)}
.sub{font-family:var(--mono);font-size:.7rem;color:var(--road);margin-top:4px}
#map{height:300px;border-bottom:2px solid var(--ink)}
.tabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;position:sticky;top:0;background:var(--paper);z-index:500;border-bottom:1px solid var(--line)}
.tab{flex:0 0 auto;border:1.5px solid var(--ink);background:var(--card);color:var(--ink);
  font-family:var(--display);font-weight:600;font-size:.85rem;padding:7px 13px;border-radius:999px;cursor:pointer}
.tab.on{background:var(--ink);color:var(--paper)}
main{padding:12px;max-width:680px;margin:0 auto}
.dayhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin:6px 0 10px}
.dayhead h2{font-family:var(--display);font-weight:800;font-size:1.15rem}
.dayhead .fk{font-family:var(--mono);font-size:.7rem;color:var(--dim);white-space:nowrap}
.sechead{font-family:var(--display);font-weight:800;font-size:.72rem;letter-spacing:.09em;
  color:var(--road);margin:14px 0 7px;padding-bottom:3px;border-bottom:2px solid var(--road)}
.tl{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:4px}
.tl-row{display:flex;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);align-items:baseline}
.tl-row:last-child{border-bottom:none}
.tl-row.klick{cursor:pointer}
.tl-row.klick:active{background:#F1EADC}
.tl-zeit{font-family:var(--mono);font-size:.72rem;color:var(--road);flex:0 0 44px}
.tl-text{font-size:.85rem;line-height:1.35}
.tl-vp{font-family:var(--mono);font-size:.66rem;color:var(--night);white-space:nowrap;margin-left:auto;padding-left:6px}
.vpnum{font-family:var(--display);font-weight:800;font-size:.8rem;color:#fff;background:var(--road);
  border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 20px}
.stop{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--road);
  border-radius:10px;padding:11px 12px;margin-bottom:9px}
.stop .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.stop .zeit{font-family:var(--mono);font-size:.72rem;color:var(--road)}
.stop h3{font-family:var(--display);font-weight:600;font-size:.98rem}
.badge{font-family:var(--display);font-weight:600;font-size:.62rem;letter-spacing:.05em;padding:2px 7px;border-radius:4px;color:#fff}
.b-foto{background:var(--road)} .b-gem{background:var(--gem)}
.stop p{font-size:.86rem;margin-top:5px;color:#3a3f48}
.stop .lnks{margin-top:7px;display:flex;gap:12px;flex-wrap:wrap}
.stop .lnks a{font-size:.8rem;font-weight:700;color:var(--night)}
.hotel{background:#E9EFFB;border:1.5px solid var(--night);border-radius:10px;padding:11px 12px;margin:4px 0 18px}
.hotel h3{font-family:var(--display);font-weight:600;font-size:.95rem;color:var(--night)}
.hotel p{font-size:.84rem;margin-top:4px}
.hotel a.book{display:inline-block;margin-top:8px;background:var(--night);color:#fff;text-decoration:none;
  font-family:var(--display);font-weight:600;font-size:.85rem;padding:8px 14px;border-radius:8px}
.stand{font-size:.7rem;color:var(--dim);margin-top:6px;font-family:var(--mono)}
.infobox{background:#EFE8D8;border:1.5px solid var(--road);border-radius:10px;padding:12px;font-size:.82rem;margin:6px 0 16px}
footer{text-align:center;font-family:var(--mono);font-size:.68rem;color:var(--dim);padding:14px 12px 26px;border-top:1px solid var(--line)}
footer button{margin-top:8px;background:none;border:1px solid var(--dim);color:var(--dim);
  font-family:var(--mono);font-size:.68rem;padding:6px 10px;border-radius:6px;cursor:pointer}
#updateBanner{display:none;position:fixed;bottom:14px;left:12px;right:12px;background:var(--ink);color:var(--paper);
  padding:12px 14px;border-radius:10px;z-index:1000;font-size:.88rem;align-items:center;justify-content:space-between;gap:10px}
#updateBanner button{background:var(--road);border:0;color:#fff;font-family:var(--display);font-weight:600;
  padding:8px 14px;border-radius:8px;cursor:pointer}
.leaflet-container{font-family:var(--sans)}
</style>
</head>

m machen (Car-Check in My Sunny Ride). Tankstand wie bei Übernahme. Hopp Schwiiz am Sonntag!", "links": []}], "hotel": null}]};


async function init(){
  TRIP=TRIP_DATA;
  document.getElementById("metaline").textContent=
    (TRIP.meta.zeitraum+" · "+TRIP.meta.buchung).toUpperCase();
  buildMap(); buildTabs(); show(0);
}

function buildMap(){
  map=L.map("map",{scrollWheelZoom:false});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    {attribution:"&copy; OpenStreetMap &copy; CARTO",maxZoom:18}).addTo(map);
  const all=[];
  TRIP.tage.forEach((tag,i)=>{
    const grp=L.layerGroup();
    const pts=tag.stopps.map(s=>[s.lat,s.lon]);
    if(tag.hotel)pts.push([tag.hotel.lat,tag.hotel.lon]);
    L.polyline(pts,{color:tag.farbe,weight:4,opacity:.85}).addTo(grp);
    tag.stopps.forEach(s=>{
      const m=L.circleMarker([s.lat,s.lon],{radius:s.major?8:6,color:"#fff",weight:1.5,
        fillColor:tag.farbe,fillOpacity:1}).addTo(grp);
      m.bindPopup(popup(s,tag));
      all.push([s.lat,s.lon]);
    });
    if(tag.hotel){
      const h=tag.hotel;
      const m=L.marker([h.lat,h.lon]).addTo(grp);
      m.bindPopup(`<b>${h.name}</b><br>${h.preis} · ${h.rating}<br>`+
        `<a href="${h.url}" target="_blank" rel="noopener">Booking.com</a> · `+gmaps(h.lat,h.lon));
      all.push([h.lat,h.lon]);
    }
    layers[i]=grp; grp.addTo(map);
  });
  map.fitBounds(all,{padding:[18,18]});
}
function gmaps(lat,lon){return `<a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" rel="noopener">Navigation</a>`;}
function popup(s,tag){
  let h=`<b>${s.name}</b><br><span style="font-size:.8em">${s.zeit} · Tag ${tag.nr}</span><br>`;
  h+=gmaps(s.lat,s.lon);
  (s.links||[]).forEach(l=>h+=` · <a href="${l.u}" target="_blank" rel="noopener">${l.t}</a>`);
  return h;
}

function buildTabs(){
  const el=document.getElementById("tabs");
  TRIP.tage.forEach((t,i)=>{
    const b=document.createElement("button");
    b.className="tab"; b.textContent=`Tag ${t.nr}`;
    b.addEventListener("click",()=>show(i));
    el.appendChild(b);
  });
}

function show(idx){
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("on",i===idx));
  const t=TRIP.tage[idx], c=document.getElementById("content");
  let h=`<div class="dayhead"><h2>Tag ${t.nr} · ${t.titel}</h2><span class="fk">${t.datum} · ${t.fakten}</span></div>`;

  // 1) Tagesablauf (Timeline) — Zeilen mit Visitpoint sind antippbar
  h+=`<div class="sechead">TAGESABLAUF</div><div class="tl">`;
  (t.ablauf||[]).forEach(a=>{
    const klick=a.vp?` klick" data-vp="${a.vp}`:``;
    h+=`<div class="tl-row${klick}"><span class="tl-zeit">${a.zeit}</span>
        <span class="tl-text">${a.text}</span>${a.vp?`<span class="tl-vp">VP ${a.vp} ↓</span>`:``}</div>`;
  });
  h+=`</div>`;

  // 2) Visitpoints (Detailkarten, nummeriert)
  h+=`<div class="sechead">VISITPOINTS</div>`;
  t.stopps.forEach((s,i)=>{
    h+=`<div class="stop" id="vp-${i+1}" style="border-left-color:${t.farbe}"><div class="top">
      <span class="vpnum">${i+1}</span><span class="zeit">${s.zeit}</span><h3>${s.name}</h3>`;
    if(s.foto)h+=`<span class="badge b-foto">FOTO</span>`;
    if(s.gem)h+=`<span class="badge b-gem">GEHEIMTIPP</span>`;
    h+=`</div><p>${s.text}</p><div class="lnks"><a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}" target="_blank" rel="noopener">Navigation ↗</a>`;
    (s.links||[]).forEach(l=>h+=`<a href="${l.u}" target="_blank" rel="noopener">${l.t} ↗</a>`);
    h+=`</div></div>`;
  });

  // 3) Übernachtung
  if(t.hotel){
    h+=`<div class="sechead">ÜBERNACHTUNG</div>`;
    const ho=t.hotel;
    h+=`<div class="hotel"><h3>${ho.name}</h3>
      <p><b>${ho.preis}</b> · ${ho.rating} · ${ho.extra}</p>
      <a class="book" href="${ho.url}" target="_blank" rel="noopener">Auf Booking.com öffnen (Datum vorbefüllt)</a>
      <p class="stand">Stand: ${TRIP.meta.stand} · Quelle: Booking.com-Suche · Verfügbarkeit ändert sich laufend</p></div>`;
  }
  if(idx===TRIP.tage.length-1){
    h+=`<div class="infobox"><b>Praktisches:</b> ${TRIP.meta.hinweis} Maut (Indiana Toll Road, Ohio Turnpike, NY Thruway) läuft meist automatisch über den Vermieter — Servicegebühren möglich. Zeitzone: ab Indiana/Ohio +1 h. An der Säule immer in USD zahlen (kein DCC).</div>`;
  }
  c.innerHTML=h;
  c.querySelectorAll(".tl-row.klick").forEach(r=>r.addEventListener("click",()=>{
    const el=document.getElementById("vp-"+r.dataset.vp);
    if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
  }));
  const grp=layers[idx];
  if(grp){const b=L.featureGroup(grp.getLayers()).getBounds();map.fitBounds(b,{padding:[24,24]});}
  window.scrollTo({top:0,behavior:"smooth"});
}

/* PWA: Service Worker + Update-Banner + Hard-Refresh */
let waitingSW=null;
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed" && navigator.serviceWorker.controller){
          waitingSW=nw;
          document.getElementById("updateBanner").style.display="flex";
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener("controllerchange",()=>location.reload());
}
document.getElementById("doUpdate").addEventListener("click",()=>{
  if(waitingSW)waitingSW.postMessage("SKIP_WAITING");
});
document.getElementById("hardRefresh").addEventListener("click",async()=>{
  if("caches" in window){for(const k of await caches.keys())await caches.delete(k);}
  if("serviceWorker" in navigator){
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs)await r.unregister();
  }
  location.reload(true);
});

init().catch(e=>{
  document.getElementById("content").innerHTML=
    `<p style="padding:20px">Daten konnten nicht geladen werden (${e}). Offline und noch nie geöffnet? Einmal mit Internet laden, danach läuft die App offline.</p>`;
});
</script>
